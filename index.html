<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jumpy Cat</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(#fff6ec, #ffd8a8);
      text-align: center;
      color: #3b2a1a;
    }

    .container {
      padding: 60px 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .phone {
      background: white;
      border-radius: 30px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .screen {
      width: 260px;
      height: 500px;
      border-radius: 20px;
      background: linear-gradient(#ffe8c7, #ffb35f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .button {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      background: #ff914d;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }

    .features {
      margin-top: 50px;
    }

    .features div {
      margin: 10px 0;
      font-size: 18px;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Jumpy Cat</h1>
    <p>Tap. Jump. Collect. Repeat.</p>

    <div class="phone">
      <div class="screen">🐱</div>
    </div>

    <div class="features">
      <div>🎮 Simple tap controls</div>
      <div>🍪 Collect treats</div>
      <div>⚡ Endless gameplay</div>
    </div>

    <a class="button" href="#">Coming Soon on the App Store</a>

    <footer>
      <br>
      <a href="https://YOURUSERNAME.github.io/jumpycat-privacy/">Privacy Policy</a>
    </footer>
  </div>
</body>
</html>
